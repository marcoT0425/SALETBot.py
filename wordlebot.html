<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>WORDLE BOT</title>
    <style>
        @font-face {
            font-family: 'DIN 2014';
            src: local('DIN 2014'), local('DIN2014-Bold');
            font-weight: 700;
        }

        :root {
            --bg: #121213;
            --absent: #3a3a3c;
            --present: #b59f3b;
            --correct: #538d4e;
            --border: #3a3a3c;
            --text: #ffffff;
            --din: 'DIN 2014', sans-serif;
        }

        body { 
            background-color: var(--bg); color: var(--text); 
            font-family: var(--din); font-weight: 700;
            display: flex; flex-direction: column; align-items: center; 
            margin: 0; padding: 20px; overflow-x: hidden;
        }

        header { border-bottom: 1px solid var(--border); width: 100%; max-width: 500px; text-align: center; padding: 10px 0; margin-bottom: 20px; }
        h1 { font-size: 42px; margin: 0; letter-spacing: 2px; }

        .controls { display: flex; gap: 8px; margin-bottom: 20px; flex-wrap: wrap; justify-content: center; }
        .btn { 
            background: #565758; color: white; border: none; padding: 10px 14px; 
            cursor: pointer; font-weight: 700; border-radius: 4px; 
            text-transform: uppercase; font-family: var(--din); font-size: 12px;
        }
        .btn-red { background: #7c2a2a; }
        .btn-green { background: var(--correct); }

        .grid { display: grid; grid-template-rows: repeat(6, 1fr); grid-gap: 5px; perspective: 1000px; }
        .row { display: grid; grid-template-columns: repeat(5, 1fr); grid-gap: 5px; }
        
        .tile { 
            width: 62px; height: 62px; border: 2px solid var(--border); 
            display: flex; align-items: center; justify-content: center; 
            font-size: 2.5rem; text-transform: uppercase; cursor: pointer;
        }

        .tile.absent { background-color: var(--absent); border-color: var(--absent); }
        .tile.present { background-color: var(--present); border-color: var(--present); }
        .tile.correct { background-color: var(--correct); border-color: var(--correct); }

        @keyframes flipIn { 0% { transform: rotateX(0); } 50% { transform: rotateX(90deg); } 100% { transform: rotateX(0); } }
        @keyframes bounceIn { 0%, 100% { transform: scale(1); } 50% { transform: scale(1.1); } }
        @keyframes shake { 10%, 90% { transform: translateX(-1px); } 20%, 80% { transform: translateX(2px); } 30%, 50%, 70% { transform: translateX(-4px); } 40%, 60% { transform: translateX(4px); } }
        @keyframes winBounce { 0%, 100% { transform: translateY(0); } 50% { transform: translateY(-20px); } }

        .flip { animation: flipIn 0.4s ease-in-out; }
        .bounce { animation: bounceIn 0.15s ease-in-out; }
        .shake { animation: shake 0.5s cubic-bezier(.36,.07,.19,.97) both; }
        .win { animation: winBounce 0.5s ease-in-out; }

        .status-bar { margin-top: 20px; color: #818384; font-size: 14px; text-align: center; }
        .pool-count { color: var(--correct); font-size: 18px; }
        .next-btn { background: var(--correct); width: 200px; margin-top: 20px; font-size: 22px; padding: 12px; }
    </style>
</head>
<body>

<header><h1>WORDLE BOT</h1></header>

<div class="controls">
    <button class="btn" onclick="document.getElementById('treeInput').click()">Upload Tree</button>
    <button class="btn" onclick="document.getElementById('wordsInput').click()">Upload Words</button>
    <button class="btn btn-green" onclick="newGame()">New Game</button>
    <button class="btn btn-red" onclick="location.reload()">Reset All</button>
    <input type="file" id="treeInput" style="display:none">
    <input type="file" id="wordsInput" style="display:none">
</div>

<div id="grid" class="grid"></div>

<div class="status-bar">
    <div id="debugMsg">Ready: Please upload your files.</div>
    <div>REMAINING POSSIBILITIES: <span id="poolCount" class="pool-count">0</span></div>
</div>

<button class="btn next-btn" onclick="handleNextGuess()">NEXT GUESS</button>

<script>
    let treeData = []; 
    let originalWordPool = []; 
    let wordPool = []; 
    let currentRow = 0; 
    let currentGuess = "";

    function init() {
        const grid = document.getElementById('grid');
        grid.innerHTML = '';
        for (let i = 0; i < 6; i++) {
            const row = document.createElement('div');
            row.className = 'row';
            for (let j = 0; j < 5; j++) {
                const tile = document.createElement('div');
                tile.className = 'tile';
                tile.dataset.state = 'none';
                tile.addEventListener('animationend', () => tile.classList.remove('flip', 'bounce', 'shake', 'win'));
                tile.onclick = () => { if(i === currentRow) cycleTile(tile); };
                row.appendChild(tile);
            }
            grid.appendChild(row);
        }
    }

    function cycleTile(tile) {
        const states = ['absent', 'present', 'correct'];
        let currentIdx = states.indexOf(tile.dataset.state);
        let nextState = states[(currentIdx + 1) % 3];
        
        tile.classList.add('flip');
        setTimeout(() => {
            tile.dataset.state = nextState;
            tile.className = `tile ${nextState} flip`;
        }, 200);
    }

    document.getElementById('treeInput').onchange = e => {
        const reader = new FileReader();
        reader.onload = (ev) => {
            treeData = ev.target.result.split('\n').map(l => l.trim().toLowerCase().split(',')).filter(l => l.length > 0);
            if(treeData.length > 0) applyWord(0, treeData[0][0]);
        };
        reader.readAsText(e.target.files[0]);
    };

    document.getElementById('wordsInput').onchange = e => {
        const reader = new FileReader();
        reader.onload = (ev) => {
            originalWordPool = ev.target.result.split(/\s+/).map(w => w.trim().toLowerCase()).filter(w => w.length === 5);
            wordPool = [...originalWordPool];
            document.getElementById('poolCount').innerText = wordPool.length;
        };
        reader.readAsText(e.target.files[0]);
    };

    function applyWord(rowIdx, word) {
        currentGuess = word.toLowerCase();
        const tiles = document.getElementsByClassName('row')[rowIdx].children;
        
        // Logical check: Determine state based on Word Pool consensus
        const states = Array(5).fill('absent');
        for (let i = 0; i < 5; i++) {
            const char = currentGuess[i];
            // If ALL words in pool have this char at index i -> Correct
            const allHaveAtPos = wordPool.every(w => w[i] === char);
            if (allHaveAtPos) {
                states[i] = 'correct';
            } else {
                // If ALL words in pool contain this char somewhere -> Present
                const allHaveSomewhere = wordPool.every(w => w.includes(char));
                if (allHaveSomewhere) states[i] = 'present';
            }
        }

        [...currentGuess].forEach((char, i) => {
            setTimeout(() => {
                tiles[i].innerText = char;
                tiles[i].dataset.state = states[i];
                tiles[i].className = `tile ${states[i]} bounce`;
            }, i * 100);
        });
    }

    // Two-pass Wordle logic for double letter filtering
    function getPattern(guess, target) {
        let res = Array(5).fill('absent');
        let targetArr = [...target];
        let guessArr = [...guess];
        for (let i = 0; i < 5; i++) {
            if (guessArr[i] === targetArr[i]) {
                res[i] = 'correct';
                targetArr[i] = null;
                guessArr[i] = null;
            }
        }
        for (let i = 0; i < 5; i++) {
            if (guessArr[i] && targetArr.includes(guessArr[i])) {
                res[i] = 'present';
                targetArr[targetArr.indexOf(guessArr[i])] = null;
            }
        }
        return res.join('');
    }

    function handleNextGuess() {
        const row = document.getElementsByClassName('row')[currentRow];
        const tiles = Array.from(row.children);
        const currentPattern = tiles.map(t => t.dataset.state).join('');

        if (currentPattern === 'correctcorrectcorrectcorrectcorrect') {
            tiles.forEach((t, i) => setTimeout(() => t.classList.add('win'), i * 100));
            return;
        }

        // Filter based on pattern
        wordPool = wordPool.filter(w => getPattern(currentGuess, w) === currentPattern);
        document.getElementById('poolCount').innerText = wordPool.length;

        if (wordPool.length === 0) {
            row.classList.add('shake');
            return;
        }

        currentRow++;
        if (currentRow < 6) {
            const firstInPool = wordPool[0];
            const matchingPath = treeData.find(path => path.includes(firstInPool));
            let nextWord = (matchingPath && matchingPath[currentRow]) ? matchingPath[currentRow] : firstInPool;
            
            // If only one word left, it's the winner
            if (wordPool.length === 1) nextWord = wordPool[0];
            
            applyWord(currentRow, nextWord);
        }
    }

    function newGame() {
        currentRow = 0;
        wordPool = [...originalWordPool];
        document.getElementById('poolCount').innerText = wordPool.length;
        init();
        if(treeData.length > 0) applyWord(0, treeData[0][0]);
    }

    init();
</script>
</body>
</html>
